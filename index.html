<!DOCTYPE html>
<html>
<head>
<title>MindMate</title>
<style>
body{
    font-family: Arial;
    margin:0;
    background:#0f172a;
    color:white;
}
section{
    padding:60px;
    text-align:center;
}
h1{
    font-size:40px;
    color:#38bdf8;
}
.card{
    background:#1e293b;
    padding:20px;
    margin:15px;
    border-radius:15px;
    display:inline-block;
    width:250px;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#38bdf8;
    cursor:pointer;
}
#chatbox{
    display:none;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<section>
<h1>🧠 MindMate</h1>
<p>Your AI-powered mental wellness companion</p>
<button onclick="startChat()">Start Talking</button>
</section>

<!-- PROBLEM -->
<section>
<h2>Problem</h2>
<div class="card">Stress & Anxiety</div>
<div class="card">No easy access to therapists</div>
<div class="card">Social stigma</div>
<div class="card">High cost</div>
</section>

<!-- FEATURES -->
<section>
<h2>Features</h2>
<div class="card">🤖 AI Chat Support</div>
<div class="card">📊 Mood Tracking</div>
<div class="card">🎮 Stress Relief Games</div>
<div class="card">👩‍⚕️ Therapist Booking</div>
</section>

<!-- DEMO CHAT -->
<section id="chatbox">
<h2>Talk to MindMate AI</h2>
<input type="text" id="userInput" placeholder="Type how you feel..." style="padding:10px;width:250px;">
<br><br>
<button onclick="reply()">Send</button>
<p id="response"></p>
</section>

<script>
function startChat(){
    document.getElementById("chatbox").style.display="block";
}

function reply(){
    let input=document.getElementById("userInput").value.toLowerCase();
    let response=document.getElementById("response");

    if(input.includes("sad")){
        response.innerHTML="I'm here for you ❤️ Try taking a deep breath.";
    }
    else if(input.includes("stress")){
        response.innerHTML="Let's relax. Try a short break or breathing exercise.";
    }
    else{
        response.innerHTML="I'm listening... tell me more 😊";
    }
}
</script>

</body>
</html>
